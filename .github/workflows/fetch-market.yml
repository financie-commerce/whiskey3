name: Fetch Whiskey&Co. Market Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data (1d)
        run: |
          curl -s -H "Accept: application/json" -H "User-Agent: Mozilla/5.0" \
            "https://financie.jp/api/charts/bancor/${{ secrets.OWNERCARD_ID }}/1d" \
            -o raw_1d.json
          curl -s -H "Accept: application/json" -H "User-Agent: Mozilla/5.0" \
            "https://financie.jp/api/charts/bancor/${{ secrets.OWNERCARD_ID }}/1w" \
            -o raw_1w.json
          curl -s -H "Accept: application/json" -H "User-Agent: Mozilla/5.0" \
            "https://financie.jp/api/charts/bancor/${{ secrets.OWNERCARD_ID }}/1m" \
            -o raw_1m.json
          curl -s -H "Accept: application/json" -H "User-Agent: Mozilla/5.0" \
            "https://financie.jp/api/charts/bancor/${{ secrets.OWNERCARD_ID }}/1y" \
            -o raw_1y.json

      - name: Parse and save market.json
        run: |
          python3 - <<'EOF'
          import json, sys, datetime

          def parse_period(path, max_points=96):
              try:
                  with open(path) as f:
                      raw = json.load(f)
              except Exception as e:
                  print(f"Failed to load {path}: {e}", file=sys.stderr)
                  return None

              # prices は [[timestamp_ms, price], ...] または chart.labels/data 形式
              prices_raw = raw.get("prices")
              if prices_raw:
                  prices = [[int(p[0]), float(p[1])] for p in prices_raw if p[1] is not None]
              else:
                  chart = raw.get("chart", {})
                  labels = chart.get("labels", [])
                  data   = chart.get("data", [])
                  prices = [[int(ts) * 1000, float(p)] for ts, p in zip(labels, data) if p is not None]

              if not prices:
                  return None

              prices = prices[-max_points:]
              current = prices[-1][1]
              first   = prices[0][1]
              change_pct = round((current - first) / first * 100, 2) if first > 0 else 0

              # bancor から補完できる場合は使う
              bancor = raw.get("bancor", {})
              if bancor.get("latest_price") is not None:
                  try:
                      current = float(bancor["latest_price"])
                  except (ValueError, TypeError):
                      pass  # パース失敗時は prices[-1][1] を使い続ける
              if bancor.get("price_change_percent") is not None:
                  try:
                      change_pct = float(bancor["price_change_percent"])
                  except (ValueError, TypeError):
                      pass

              total_supply = bancor.get("total_token_amount") or bancor.get("total_supply") or 0
              stock        = bancor.get("stock_token_amount") or bancor.get("stock") or 0
              market_cap   = round(current * (total_supply - stock), 1) if total_supply else 0

              return {
                  "price":       round(current, 4),
                  "changePct":   change_pct,
                  "marketCap":   f"{market_cap:,.1f}" if market_cap else "—",
                  "volume":      "0",
                  "totalSupply": int(total_supply),
                  "stock":       int(stock),
                  "chart": {
                      "labels": [p[0] for p in prices],
                      "data":   [p[1] for p in prices],
                  }
              }

          now_jst = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          asof = now_jst.strftime("%Y/%m/%d %H:%M")

          periods = {}
          for key, path in [("day","raw_1d.json"),("week","raw_1w.json"),("month","raw_1m.json"),("year","raw_1y.json")]:
              result = parse_period(path)
              if result:
                  periods[key] = result
              else:
                  print(f"Skipping period {key}", file=sys.stderr)

          if not periods:
              print("All periods failed", file=sys.stderr)
              sys.exit(1)

          out = {"asof": asof, "periods": periods}
          with open("market.json", "w") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          day = periods.get("day", {})
          print(f"Saved: asof={asof}, price={day.get('price')}, change={day.get('changePct')}%")
          EOF

      - name: Commit market.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
