name: Fetch Whiskey&Co. Market Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data from FiNANCiE API
        run: |
          curl -s \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            "https://financie.jp/api/charts/bancor/${{ secrets.OWNERCARD_ID }}/1d" \
            -o market_raw.json

      - name: Parse and save market.json
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import sys
          import datetime

          with open("market_raw.json") as f:
              raw = json.load(f)

          chart = raw.get("chart", {})
          bancor = raw.get("bancor", {})

          labels = chart.get("labels", [])
          data = chart.get("data", [])
          price_change = bancor.get("price_change_percent")

          if not labels or not data:
              print("No chart data found", file=sys.stderr)
              sys.exit(1)

          prices = [[int(ts) * 1000, float(p)] for ts, p in zip(labels, data)]
          current_price = round(float(data[-1]), 4)

          out = {
              "fetched_at": datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00', 'Z'),
              "current_price": current_price,
              "price_change_percent": float(price_change) if price_change else None,
              "prices": prices[-96:],
          }

          with open("market.json", "w") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print(f"Saved: price={current_price}, change={price_change}%")
          PYTHON_EOF

      - name: Commit market.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
