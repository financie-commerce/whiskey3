name: Fetch Whiskey&Co. Market Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data from FiNANCiE API
        run: |
          curl -s \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            "https://financie.jp/api/charts/bancor/${{ secrets.OWNERCARD_ID }}/1d" \
            -o market_raw.json
- name: Debug - Show raw API response
        run: |
          echo "=== RAW API RESPONSE ==="
          head -c 500 market_raw.json
          echo ""
          echo "=== bancor section ==="
          python3 -c "import json; d=json.load(open('market_raw.json')); print(json.dumps(d.get('bancor'), indent=2))"
      - name: Parse and save market.json
        run: |
          python3 - <<'EOF'
          import json, sys, datetime

          with open("market_raw.json") as f:
              raw = json.load(f)

          # Whiskey&Co. API構造:
          #   raw.bancor.latest_price        → 現在価格
          #   raw.bancor.price_change_percent → 前日比(%)
          #   raw.chart.labels[]             → Unix秒タイムスタンプ
          #   raw.chart.data[]               → 対応する価格

          bancor = raw.get("bancor", {})
          chart  = raw.get("chart", {})

          latest_price = bancor.get("latest_price")
          price_change = bancor.get("price_change_percent")

          labels = chart.get("labels", [])
          data   = chart.get("data", [])

          if not labels or not data:
              print("No chart data found", file=sys.stderr)
              sys.exit(1)

          # [[timestamp_ms, price], ...] 形式に統一（在る宵互換）
          prices = [[int(ts) * 1000, float(p)] for ts, p in zip(labels, data)]

          out = {
              "fetched_at": datetime.datetime.utcnow().isoformat() + "Z",
              "current_price": round(float(data[-1]), 4) if data else 0,
              "price_change_percent": float(price_change) if price_change else None,
              "prices": prices[-96:],  # 最大96件
          }

          with open("market.json", "w") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print(f"Saved: price={out['current_price']}, change={out['price_change_percent']}%")
          EOF

      - name: Commit market.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
